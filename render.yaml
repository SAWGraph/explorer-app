databases:
  - name: sawgraph-db
    plan: free
    databaseName: sawgraph
    user: sawgraph

services:
  - type: web
    name: sawgraph-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sawgraph-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
      - key: NODE_VERSION
        value: 20

  - type: web
    name: sawgraph-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
